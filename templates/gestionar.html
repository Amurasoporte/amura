<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión | {{ agencia.nombre }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --rose: #ec4899;
            --rose-dark: #be185d;
            --bg-light: #f5f5f7;
            --surface: #ffffff;
            --elevated: #f8f9fa;
            --text: #1e1e2e;
            --text-secondary: #6c757d;
            --border: #eaeef2;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
            --delete: #ef4444;
        }
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-light);
            color: var(--text);
            min-height: 100vh;
        }
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .logo {
            font-size: 26px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .logo-heart {
            background: linear-gradient(135deg, #f5a3c7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .logo-text {
            background: linear-gradient(135deg, #f5a3c7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
            transition: all 0.2s;
            background: var(--elevated);
        }
        .back-link:hover {
            background: var(--surface);
            border-color: var(--rose);
            color: var(--rose);
        }
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 40px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--surface);
            padding: 32px;
            border-radius: 32px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .agency-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .agency-title i {
            color: var(--rose);
        }
        .side-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 32px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 100px;
        }
        .perfil-row {
            background: var(--elevated);
            padding: 20px;
            border-radius: 20px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .perfil-row:hover {
            border-color: var(--rose);
            transform: translateX(5px);
        }
        .perfil-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .perfil-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            overflow: hidden;
            background: var(--elevated);
        }
        .perfil-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .perfil-name {
            font-weight: 700;
            font-size: 16px;
        }
        .perfil-email {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .btn-del {
            background: transparent;
            color: var(--delete);
            border: 1px solid var(--delete);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-del:hover {
            background: var(--delete);
            color: white;
        }
        .btn-add {
            background: var(--rose);
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            margin-top: 24px;
            transition: 0.2s;
            font-size: 14px;
        }
        .btn-add:hover {
            background: var(--rose-dark);
            transform: translateY(-2px);
        }
        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-top: 8px;
            box-sizing: border-box;
            font-weight: 500;
            background: var(--elevated);
            font-size: 14px;
            color: var(--text);
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--rose);
            box-shadow: 0 0 0 3px rgba(236,72,153,0.1);
        }
        label {
            font-size: 12px;
            font-weight: 600;
            margin-top: 18px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }
        .empty-models {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-models i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        .kyc-section {
            border-top: 1px solid var(--border);
            margin-top: 20px;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <span class="logo-heart">❤️</span>
            <span class="logo-text">Amura</span>
        </div>
        <a href="/master" class="back-link">
            <i class="fas fa-arrow-left"></i> VOLVER AL MASTER
        </a>
    </nav>
    
    <div class="container">
        <div class="card">
            <div class="agency-title">
                <i class="fas fa-building"></i>
                {{ agencia.nombre }}
            </div>
            
            {% for p in agencia.perfiles %}
            <div class="perfil-row">
                <div class="perfil-info">
                    <div class="perfil-avatar">
                        <img src="/static/uploads/{{ p.foto_principal }}" onerror="this.src='/static/default_user.png'">
                    </div>
                    <div>
                        <div class="perfil-name">{{ p.nombre }}</div>
                        <div class="perfil-email">{{ p.correo }}</div>
                    </div>
                </div>
                <button onclick="eliminarPerfil('{{ p.id }}')" class="btn-del">
                    <i class="fas fa-trash"></i> ELIMINAR
                </button>
            </div>
            {% else %}
            <div class="empty-models">
                <i class="fas fa-user-slash"></i>
                <p>Sin modelos registradas</p>
                <p style="font-size: 12px; margin-top: 5px;">Completa el formulario para agregar tu primera modelo</p>
            </div>
            {% endfor %}
        </div>
        
        <div class="side-card">
            <h3 style="margin:0 0 20px; display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700;">
                <i class="fas fa-plus-circle" style="color: var(--rose);"></i>
                Vincular Nueva Modelo
            </h3>
            
            <label>NOMBRE ARTÍSTICO</label>
            <input type="text" id="nom-perfil" placeholder="Ej: Valeria Moon">
            
            <label>EMAIL DE ACCESO</label>
            <input type="email" id="cor-perfil" placeholder="modelo@email.com">
            
            <label>CONTRASEÑA</label>
            <input type="text" id="pass-perfil" placeholder="Genera una clave segura">
            
            <label>FOTO PRINCIPAL</label>
            <input type="file" id="foto-perfil" accept="image/*" style="background: var(--elevated); padding: 12px;">
            
            <!-- KYC: documento de identidad -->
            <div class="kyc-section">
                <label>DOCUMENTO DE IDENTIDAD (KYC) - Solo visible para SuperAdmin</label>
                <input type="file" id="documento-perfil" accept="image/*,application/pdf" style="background: var(--elevated); padding: 12px;">
            </div>
            
            <button class="btn-add" onclick="guardarPerfil()">
                <i class="fas fa-check-circle"></i> AUTORIZAR Y CREAR
            </button>
            
            <div style="margin-top: 20px; font-size: 11px; text-align: center; color: var(--text-secondary);">
                <i class="fas fa-info-circle"></i> La modelo recibirá un acceso con estos datos
            </div>
        </div>
    </div>
    
    <script>
        async function guardarPerfil() {
            const nombre = document.getElementById('nom-perfil').value.trim();
            const correo = document.getElementById('cor-perfil').value.trim();
            const password = document.getElementById('pass-perfil').value;
            const foto = document.getElementById('foto-perfil').files[0];
            const documento = document.getElementById('documento-perfil').files[0];
            if(!nombre || !correo || !password) {
                alert("❌ Completa todos los campos obligatorios");
                return;
            }
            const formData = new FormData();
            formData.append('nombre', nombre);
            formData.append('correo', correo);
            formData.append('password', password);
            formData.append('agencia_id', "{{ agencia.id }}");
            if(foto) formData.append('foto', foto);
            if(documento) formData.append('documento', documento);
            const btn = document.querySelector('.btn-add');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando...';
            btn.disabled = true;
            try {
                const res = await fetch('/api/crear_perfil', { method: 'POST', body: formData });
                if(res.ok) {
                    alert('✅ Modelo creada exitosamente');
                    location.reload();
                } else {
                    const error = await res.json();
                    alert("❌ " + (error.msg || "Error al registrar"));
                }
            } catch (error) {
                alert("❌ Error de conexión");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function eliminarPerfil(id) {
            if(confirm("⚠️ ¿Eliminar este perfil definitivamente? Se perderán todos sus chats y fotos.")) {
                const res = await fetch(`/api/eliminar_perfil/${id}`, { method: 'DELETE' });
                if(res.ok) location.reload();
                else alert("❌ Error al eliminar");
            }
        }
    </script>
</body>
</html>
