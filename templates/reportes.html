<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportes de Liquidación | Amura</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f5f5f7; padding: 40px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 32px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        h1 { margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        select, input { width: 100%; padding: 10px; border-radius: 16px; border: 1px solid #ddd; }
        button { background: #ec4899; color: white; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; margin-top: 10px; }
        .resultado { margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 24px; display: none; }
        .back { display: inline-block; margin-bottom: 20px; color: #6c757d; text-decoration: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eaeef2; }
    </style>
</head>
<body>
<div class="container">
    <a href="/master" class="back">&larr; Volver al panel</a>
    <h1>Generar Reporte de Liquidación</h1>
    <div class="form-group">
        <label>Agencia</label>
        <select id="agencia_id">
            <option value="">Seleccione una agencia</option>
            {% for a in agencias %}
            <option value="{{ a.id }}">{{ a.nombre }} (Comisión: {{ a.comision }}%)</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Fecha inicio</label>
        <input type="date" id="fecha_inicio">
    </div>
    <div class="form-group">
        <label>Fecha fin</label>
        <input type="date" id="fecha_fin">
    </div>
    <button onclick="generarReporte()">Generar Reporte</button>
    <div id="resultado" class="resultado"></div>
</div>
<script>
    async function generarReporte() {
        const agencia_id = document.getElementById('agencia_id').value;
        const fecha_inicio = document.getElementById('fecha_inicio').value;
        const fecha_fin = document.getElementById('fecha_fin').value;
        if (!agencia_id || !fecha_inicio || !fecha_fin) {
            alert('Complete todos los campos');
            return;
        }
        const res = await fetch('/api/generar_reporte', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({agencia_id, fecha_inicio, fecha_fin})
        });
        const data = await res.json();
        if (data.success) {
            const resultadoDiv = document.getElementById('resultado');
            resultadoDiv.style.display = 'block';
            resultadoDiv.innerHTML = `
                <h3>Resumen</h3>
                <p><strong>Agencia:</strong> ${document.getElementById('agencia_id').options[document.getElementById('agencia_id').selectedIndex].text}</p>
                <p><strong>Período:</strong> ${fecha_inicio} al ${fecha_fin}</p>
                <p><strong>Créditos generados:</strong> ${data.creditos}</p>
                <p><strong>Monto a pagar:</strong> $${data.monto.toFixed(2)} USD</p>
                <button onclick="window.location.reload()">Nuevo reporte</button>
            `;
        } else {
            alert('Error: ' + (data.msg || 'No se pudo generar'));
        }
    }
</script>
</body>
</html>
