<!-- MODAL DE EMOCIONES CON TERMÓMETRO COMPLETO -->
<div id="moodModalNav" class="modal-mood" onclick="if(event.target===this) this.style.display='none'">
    <div class="modal-mood-content">
        <h3>¿Cómo te sientes hoy?</h3>
        <div class="mood-thermometer" id="moodThermometerNav"></div>
        <div class="thermometer-container">
            <div class="thermometer-bar"></div>
            <div class="thermometer-ticks" id="thermometerTicksNav"></div>
            <div class="thermometer-marker" id="thermometerMarkerNav"></div>
        </div>
        <button onclick="document.getElementById('moodModalNav').style.display='none'" style="margin-top: 20px; padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border); cursor:pointer;">Cerrar</button>
    </div>
</div>

<!-- MODAL DE COLORES -->
<div class="modal-color" id="colorModalGlobal" onclick="if(event.target===this) this.style.display='none'">
    <div class="modal-color-content">
        <h3>🎨 Personalizar colores</h3>
        <div class="color-palette">
            <div class="color-option color-rosa" data-theme="rosa" title="Rosa"></div>
            <div class="color-option color-azul" data-theme="azul" title="Azul"></div>
            <div class="color-option color-verde" data-theme="verde" title="Verde"></div>
            <div class="color-option color-purpura" data-theme="purpura" title="Púrpura"></div>
        </div>
        <button onclick="document.getElementById('colorModalGlobal').style.display='none'" class="close-color-btn">Cerrar</button>
    </div>
</div>

<style>
    /* ========== ESTILOS DE LA NAVBAR ========== */
    .navbar {
        background: white;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        padding: 0.8rem 2rem;
    }
    .nav-container {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem 2rem;
        position: relative;
    }
    .logo {
        font-size: 28px;
        font-weight: 800;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
        text-decoration: none;
    }
    .logo-heart, .logo-text {
        background: linear-gradient(135deg, var(--rose-grad-start), var(--rose-grad-end));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .logo-heart {
        font-size: 32px;
        line-height: 1;
    }
    .central-links {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem 1rem;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
    }
    .nav-item {
        font-size: 0.85rem;
        font-weight: 500;
        color: #2c2c2c;
        text-decoration: none;
        padding: 0.6rem 1.1rem;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: transparent;
        cursor: pointer;
        border: none;
        font-family: inherit;
        transition: background-color 0.2s;
    }
    .nav-item:hover {
        background-color: var(--hover-bg);
        color: #2c2c2c;
    }
    .btn-buy-cr {
        background-color: var(--rose);
        color: white;
        font-weight: 600;
        border-radius: 20px;
    }
    .btn-buy-cr:hover {
        background-color: var(--rose-dark);
        color: white;
    }
    
    /* HOY ESTOY - texto y símbolo con animación */
    .hoy-estoy-text {
        margin-right: 2px;
        text-transform: uppercase;
    }
    .mood-symbol {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background-color: #f0f0f0;
        border-radius: 50%;
        font-size: 1rem;
        font-weight: 600;
        color: #999999;
        line-height: 1;
        transition: all 0.2s;
        animation: subtleSideShake 2s ease-in-out infinite;
    }
    .mood-symbol img {
        width: 24px;
        height: 24px;
        object-fit: contain;
    }
    
    @keyframes subtleSideShake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(1px); }
        75% { transform: translateX(-1px); }
    }
    
    /* CORREOS con punto animado */
    .mail-text {
        position: relative;
        display: inline-block;
        line-height: 1;
    }
    .red-dot {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        right: -10px;
        width: 5px;
        height: 5px;
        background-color: #cc0000;
        border-radius: 50%;
        box-shadow: 0 0 0 1px white;
        animation: bounceDot 1s ease 0.5s 1, subtleBounce 3s infinite 2s;
    }
    @keyframes bounceDot {
        0%, 100% { transform: translateY(-50%) scale(1); }
        50% { transform: translateY(-50%) translateY(-3px) scale(1.2); }
    }
    @keyframes subtleBounce {
        0%, 100% { transform: translateY(-50%) scale(1); }
        50% { transform: translateY(-50%) translateY(-2px) scale(1.1); }
    }
    
    /* Configuración tres puntos */
    .config-dots {
        font-size: 1.6rem;
        font-weight: 700;
        line-height: 1;
        letter-spacing: normal;
        transform: translateY(-2px);
        cursor: pointer;
        position: relative;
        margin-left: auto;
    }
    
    /* POPUP DE CONFIGURACIÓN */
    .config-popup {
        position: absolute;
        top: calc(100% + 12px);
        right: 0;
        width: 260px;
        background: white;
        border-radius: 24px;
        box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(0,0,0,0.02);
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-8px);
        transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s;
        overflow: visible;
    }
    .config-popup.active {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }
    .config-popup::before {
        content: '';
        position: absolute;
        top: -8px;
        right: 18px;
        width: 14px;
        height: 14px;
        background: white;
        border-left: 1px solid var(--border);
        border-top: 1px solid var(--border);
        transform: rotate(45deg);
        z-index: -1;
    }
    .popup-header {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid var(--border);
    }
    .popup-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--rose);
    }
    .popup-menu-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        font-size: 0.8rem;
        font-weight: 500;
        color: #2c2c2c;
        text-decoration: none;
        transition: background 0.2s;
        cursor: pointer;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
    }
    .popup-menu-item:hover {
        background: #f5f5f5;
    }
    .popup-divider {
        height: 1px;
        background: var(--border);
        margin: 6px 0;
    }
    .logout-item {
        color: #ef4444;
    }
    .logout-item i {
        color: #ef4444;
    }
    
    /* ========== ESTILOS DEL TERMÓMETRO ========== */
    .modal-mood {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1100;
    }
    .modal-mood-content {
        background: white;
        border-radius: 40px;
        padding: 2rem 1.5rem;
        max-width: 1000px;
        width: 90%;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        overflow: visible;
    }
    .modal-mood-content h3 {
        font-size: 1.4rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        background: linear-gradient(135deg, var(--rose-grad-start), var(--rose-grad-end));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }
    .mood-thermometer {
        display: flex;
        flex-wrap: nowrap;
        justify-content: center;
        gap: 0.8rem;
        margin: 1rem 0 0.5rem 0;
        overflow-x: visible;
        padding-bottom: 20px;
    }
    @media (max-width: 900px) {
        .mood-thermometer {
            flex-wrap: wrap;
            justify-content: center;
        }
    }
    .mood-card {
        flex: 0 0 auto;
        width: 90px;
        text-align: center;
        cursor: pointer;
        border-radius: 28px;
        padding: 0.8rem 0.5rem;
        transition: transform 0.2s;
        background: transparent;
        position: relative;
        overflow: visible;
    }
    .mood-card:hover {
        transform: translateY(-8px);
    }
    .mood-card:hover .mood-icon::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 120px;
        height: 120px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, currentColor 0%, transparent 70%);
        opacity: 0.7;
        border-radius: 50%;
        pointer-events: none;
        z-index: -1;
    }
    .mood-card[data-mood="No lo sé"]:hover .mood-icon::before { color: #b6b6b6; }
    .mood-card[data-mood="Enfermo"]:hover .mood-icon::before { color: #30c078; }
    .mood-card[data-mood="Sigiloso"]:hover .mood-icon::before { color: #a2cb49; }
    .mood-card[data-mood="Serio"]:hover .mood-icon::before { color: #efc417; }
    .mood-card[data-mood="Amigable"]:hover .mood-icon::before { color: #f7ad42; }
    .mood-card[data-mood="Romántico"]:hover .mood-icon::before { color: #e87c22; }
    .mood-card[data-mood="Coqueto"]:hover .mood-icon::before { color: #f17762; }
    .mood-card[data-mood="Travieso"]:hover .mood-icon::before { color: #b8392a; }
    .mood-icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 8px;
        position: relative;
    }
    .mood-icon img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }
    .mood-name {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        color: #1f2937;
    }
    .thermometer-container {
        margin-top: 0.5rem;
        position: relative;
        width: 100%;
        padding: 0 10px;
    }
    .thermometer-bar {
        height: 6px;
        width: 100%;
        background: linear-gradient(90deg,
            #b6b6b6 0%, #b6b6b6 12.5%,
            #30c078 12.5%, #30c078 25%,
            #a2cb49 25%, #a2cb49 37.5%,
            #efc417 37.5%, #efc417 50%,
            #f7ad42 50%, #f7ad42 62.5%,
            #e87c22 62.5%, #e87c22 75%,
            #f17762 75%, #f17762 87.5%,
            #b8392a 87.5%, #b8392a 100%);
        border-radius: 3px;
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.1), 0 1px 0 rgba(255,255,255,0.3);
    }
    .thermometer-ticks {
        position: absolute;
        top: -5px;
        left: 0;
        right: 0;
        height: 16px;
        pointer-events: none;
    }
    .tick {
        position: absolute;
        width: 1px;
        height: 12px;
        background: rgba(0,0,0,0.2);
        top: 0;
        transform: translateX(-50%);
    }
    .tick-label {
        position: absolute;
        font-size: 8px;
        color: #6c757d;
        top: 10px;
        transform: translateX(-50%);
        white-space: nowrap;
    }
    .tick-label span {
        font-weight: 500;
    }
    .thermometer-marker {
        position: absolute;
        bottom: 100%;
        width: 2px;
        height: 16px;
        background: currentColor;
        transform: translateX(-50%);
        transition: left 0.2s ease;
        pointer-events: none;
        box-shadow: 0 0 8px currentColor;
        opacity: 0;
    }
    .thermometer-marker.active {
        opacity: 1;
    }
    
    /* MODAL DE COLORES */
    .modal-color {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1100;
    }
    .modal-color-content {
        background: white;
        border-radius: 32px;
        padding: 2rem;
        max-width: 320px;
        width: 90%;
        text-align: center;
    }
    .color-palette {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin: 1rem 0;
    }
    .color-option {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.2s;
    }
    .color-option:hover {
        transform: scale(1.1);
    }
    .color-rosa { background: linear-gradient(135deg, #f5a3c7, #ec4899); }
    .color-azul { background: linear-gradient(135deg, #93c5fd, #3b82f6); }
    .color-verde { background: linear-gradient(135deg, #a7f3d0, #10b981); }
    .color-purpura { background: linear-gradient(135deg, #e9d5ff, #a855f7); }
    .close-color-btn {
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 0.8rem;
        cursor: pointer;
        margin-top: 0.5rem;
        transition: color 0.2s;
    }
    .close-color-btn:hover {
        color: var(--rose);
    }
</style>

<script>
    // ========== CONFIGURACIÓN DE EMOCIONES CON TERMÓMETRO ==========
    const moodsGlobal = [
        { name: "No lo sé",   img: "/static/hoy_estoy/no_se.png", color: "#b6b6b6" },
        { name: "Enfermo",    img: "/static/hoy_estoy/Enfermo.png", color: "#30c078" },
        { name: "Sigiloso",   img: "/static/hoy_estoy/Sigiloso.png", color: "#a2cb49" },
        { name: "Serio",      img: "/static/hoy_estoy/Serio.png", color: "#efc417" },
        { name: "Amigable",   img: "/static/hoy_estoy/Amigable.png", color: "#f7ad42" },
        { name: "Romántico",  img: "/static/hoy_estoy/Romantico.png", color: "#e87c22" },
        { name: "Coqueto",    img: "/static/hoy_estoy/Coqueto.png", color: "#f17762" },
        { name: "Travieso",   img: "/static/hoy_estoy/Travieso.png", color: "#b8392a" }
    ];

    function createTicksGlobal() {
        const container = document.getElementById('thermometerTicksNav');
        if (!container) return;
        container.innerHTML = '';
        const segments = moodsGlobal.length;
        for (let i = 0; i <= segments; i++) {
            const leftPercent = (i / segments) * 100;
            const tick = document.createElement('div');
            tick.className = 'tick';
            tick.style.left = `${leftPercent}%`;
            container.appendChild(tick);
            if (i < segments) {
                const label = document.createElement('div');
                label.className = 'tick-label';
                label.style.left = `${leftPercent + (100 / segments / 2)}%`;
                label.innerHTML = `<span>${i}</span>`;
                container.appendChild(label);
            }
        }
    }

    function updateMarkerGlobal(index) {
        const marker = document.getElementById('thermometerMarkerNav');
        if (!marker) return;
        if (index === undefined) {
            marker.classList.remove('active');
            return;
        }
        const segments = moodsGlobal.length;
        const leftPercent = (index / segments) * 100;
        marker.style.left = `${leftPercent}%`;
        marker.style.color = moodsGlobal[index].color;
        marker.classList.add('active');
    }

    function renderMoodOptionsGlobal() {
        const container = document.getElementById('moodThermometerNav');
        if (!container) return;
        container.innerHTML = '';
        moodsGlobal.forEach((mood, idx) => {
            const card = document.createElement('div');
            card.className = 'mood-card';
            card.setAttribute('data-mood', mood.name);
            card.innerHTML = `
                <div class="mood-icon"><img src="${mood.img}" alt="${mood.name}"></div>
                <div class="mood-name">${mood.name}</div>
            `;
            card.addEventListener('mouseenter', () => updateMarkerGlobal(idx));
            card.addEventListener('mouseleave', () => updateMarkerGlobal());
            card.addEventListener('click', () => selectMoodGlobal(mood.name, mood.img));
            container.appendChild(card);
        });
    }

    function selectMoodGlobal(moodName, moodImg) {
        const hoyEstoyText = document.getElementById('hoyEstoyText');
        const moodSymbol = document.getElementById('moodSymbol');
        if (moodName === "No lo sé") {
            if (hoyEstoyText) hoyEstoyText.textContent = "HOY ESTOY";
            if (moodSymbol) moodSymbol.innerHTML = "?";
            localStorage.removeItem('amura_mood');
            localStorage.removeItem('amura_mood_icon');
        } else {
            if (hoyEstoyText) hoyEstoyText.textContent = moodName.toUpperCase();
            if (moodSymbol) moodSymbol.innerHTML = `<img src="${moodImg}" style="width:24px; height:24px;">`;
            localStorage.setItem('amura_mood', moodName);
            localStorage.setItem('amura_mood_icon', moodImg);
        }
        document.getElementById('moodModalNav').style.display = 'none';
        showToastGlobal(`❤️ Estado: "${moodName}"`);
    }

    function loadSavedMoodGlobal() {
        const savedMood = localStorage.getItem('amura_mood');
        const savedIcon = localStorage.getItem('amura_mood_icon');
        const hoyEstoyText = document.getElementById('hoyEstoyText');
        const moodSymbol = document.getElementById('moodSymbol');
        if (savedMood && savedMood !== "No lo sé") {
            if (hoyEstoyText) hoyEstoyText.textContent = savedMood.toUpperCase();
            if (moodSymbol) moodSymbol.innerHTML = `<img src="${savedIcon}" style="width:24px; height:24px;">`;
        }
    }

    function showToastGlobal(message) {
        let toast = document.getElementById('dynamicToastGlobal');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'dynamicToastGlobal';
            toast.style.cssText = `
                position: fixed;
                bottom: 80px;
                left: 50%;
                transform: translateX(-50%);
                background: #1f2937;
                color: white;
                padding: 8px 16px;
                border-radius: 40px;
                font-size: 12px;
                z-index: 9999;
                opacity: 0;
                transition: opacity 0.3s;
                pointer-events: none;
                white-space: nowrap;
            `;
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 3000);
    }

    // ========== FUNCIONES GLOBALES ==========
    async function comprarCreditosGlobal() {
        const res = await fetch('/api/comprar_creditos', { method: 'POST' });
        const data = await res.json();
        if(data.success) showToastGlobal('⚡ 100 CR añadidos');
        if(data.creditos) {
            const creditsSpan = document.querySelector('.credits-pill span');
            if(creditsSpan) creditsSpan.textContent = data.creditos;
        }
    }

    // ========== FUNCIÓN PARA CAMBIAR TEMA GLOBALMENTE ==========
    function changeThemeGlobal(theme) {
        // Cambiar la clase del body
        document.body.className = `theme-${theme}`;
        
        // Actualizar las variables CSS dinámicamente
        const root = document.documentElement;
        let rose, roseDark, roseGradStart, roseGradEnd;
        
        switch(theme) {
            case 'rosa':
                rose = '#ec4899';
                roseDark = '#be185d';
                roseGradStart = '#f5a3c7';
                roseGradEnd = '#ec4899';
                break;
            case 'azul':
                rose = '#3b82f6';
                roseDark = '#2563eb';
                roseGradStart = '#93c5fd';
                roseGradEnd = '#3b82f6';
                break;
            case 'verde':
                rose = '#10b981';
                roseDark = '#059669';
                roseGradStart = '#a7f3d0';
                roseGradEnd = '#10b981';
                break;
            case 'purpura':
                rose = '#a855f7';
                roseDark = '#7c3aed';
                roseGradStart = '#e9d5ff';
                roseGradEnd = '#a855f7';
                break;
            default:
                rose = '#ec4899';
                roseDark = '#be185d';
                roseGradStart = '#f5a3c7';
                roseGradEnd = '#ec4899';
        }
        
        root.style.setProperty('--rose', rose);
        root.style.setProperty('--rose-dark', roseDark);
        root.style.setProperty('--rose-grad-start', roseGradStart);
        root.style.setProperty('--rose-grad-end', roseGradEnd);
        
        localStorage.setItem('theme', theme);
        
        // Actualizar gradientes en elementos con background-clip
        document.querySelectorAll('.logo-heart, .logo-text, .profile-card h3, .modal-mood-content h3, .modal-color-content h3, .card-header h2').forEach(el => {
            if (el) {
                el.style.backgroundImage = `linear-gradient(135deg, ${roseGradStart}, ${roseGradEnd})`;
                el.style.webkitBackgroundClip = 'text';
                el.style.backgroundClip = 'text';
                el.style.webkitTextFillColor = 'transparent';
            }
        });
        
        const colorModal = document.getElementById('colorModalGlobal');
        if (colorModal) colorModal.style.display = 'none';
    }

    // ========== INICIALIZACIÓN ==========
    document.addEventListener('DOMContentLoaded', function() {
        // Emociones
        const hoyEstoyBtn = document.getElementById('hoyEstoyBtn');
        if (hoyEstoyBtn) {
            hoyEstoyBtn.addEventListener('click', () => {
                const modal = document.getElementById('moodModalNav');
                if (modal) modal.style.display = 'flex';
                renderMoodOptionsGlobal();
                createTicksGlobal();
            });
        }
        renderMoodOptionsGlobal();
        createTicksGlobal();
        loadSavedMoodGlobal();

        // Colores - cargar tema guardado
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            changeThemeGlobal(savedTheme);
        } else {
            changeThemeGlobal('rosa');
        }

        // Botones de colores
        const colorOptions = document.querySelectorAll('.color-option');
        colorOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                const theme = opt.getAttribute('data-theme');
                changeThemeGlobal(theme);
            });
        });

        // Botón personalizar colores
        const customizeColorsBtn = document.getElementById('customizeColorsBtnGlobal');
        if (customizeColorsBtn) {
            customizeColorsBtn.addEventListener('click', () => {
                const colorModal = document.getElementById('colorModalGlobal');
                if (colorModal) colorModal.style.display = 'flex';
            });
        }

        // Popup de configuración
        const configDotsBtn = document.getElementById('configDotsBtn');
        const configPopup = document.getElementById('configPopup');
        if (configDotsBtn && configPopup) {
            configDotsBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                configPopup.classList.toggle('active');
            });
            document.addEventListener('click', function(event) {
                if (!configDotsBtn.contains(event.target) && !configPopup.contains(event.target)) {
                    configPopup.classList.remove('active');
                }
            });
        }
    });
</script>
