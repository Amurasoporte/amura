<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración | Amura</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f5f5f7; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 32px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        h1 { font-size: 28px; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eaeef2; }
        th { background: #f8f9fa; }
        input { width: 80px; padding: 6px; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #ec4899; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .save-btn { background: #10b981; }
        .back { display: inline-block; margin-bottom: 20px; color: #6c757d; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <a href="/master" class="back">&larr; Volver al panel</a>
    <h1>Configuración de Tasas (Rates)</h1>
    <table id="ratesTable">
        <thead>
            <tr><th>Acción</th><th>Costo (créditos)</th><th>Ganancia modelo</th><th>Valor USD/crédito</th><th>Activo</th><th></th></tr>
        </thead>
        <tbody>
            {% for rate in rates %}
            <tr data-id="{{ rate.id }}">
                <td>{{ rate.accion }}</td>
                <td><input type="number" class="costo" value="{{ rate.costo_creditos }}" step="1" min="0"></td>
                <td><input type="number" class="ganancia" value="{{ rate.ganancia_modelo }}" step="1" min="0"></td>
                <td><input type="number" class="usd" value="{{ rate.valor_usd }}" step="0.01" min="0"></td>
                <td><input type="checkbox" class="activo" {% if rate.activo %}checked{% endif %}></td>
                <td><button class="save-btn" onclick="guardarRate(this)">Guardar</button></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<script>
    async function guardarRate(btn) {
        const row = btn.closest('tr');
        const id = row.dataset.id;
        const costo = row.querySelector('.costo').value;
        const ganancia = row.querySelector('.ganancia').value;
        const usd = row.querySelector('.usd').value;
        const activo = row.querySelector('.activo').checked;
        const res = await fetch('/api/update_rate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id, costo_creditos: costo, ganancia_modelo: ganancia, valor_usd: usd, activo})
        });
        const data = await res.json();
        if (data.success) alert('Guardado');
        else alert('Error');
    }
</script>
</body>
</html>
